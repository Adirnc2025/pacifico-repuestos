# ============================================================
# Pacífico Repuestos — Configuración (SQL Server)
# ============================================================

# Servidor
server.port=8080

# Base de datos — SQL Server con Autenticación SQL
spring.datasource.url=${DATABASE_URL:jdbc:sqlserver://localhost:1433;databaseName=pacifico_db;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:CHANGE_ME}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:CHANGE_ME_MIN_256BITS}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
frontend.url=${FRONTEND_URL:http://localhost:5173}

# Subida de archivos
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=10MB

# Logs
logging.level.com.pacifico=INFO
