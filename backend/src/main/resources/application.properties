# ============================================================
# Pacífico Repuestos — Configuración (PostgreSQL)
# ============================================================

# Servidor
server.port=8080

# Base de datos — PostgreSQL (host/puerto/db/usuario/password por variable de entorno)
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:pacifico_db}?sslmode=${DATABASE_SSLMODE:disable}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:CHANGE_ME}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP - limites bajos para planes con pocas conexiones (ej. Aiven free tier: max_connections=20)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:CHANGE_ME_MIN_256BITS}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
frontend.url=${FRONTEND_URL:http://localhost:5173}

# Subida de archivos
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=10MB

# Logs
logging.level.com.pacifico=INFO
